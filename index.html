<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Аналитика продаж — Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { --bg: #f3f4f6; --card: #ffffff; --text: #111827; --muted: #6b7280; --primary: #1e3a8a; --ok: #10b981; --bad: #ef4444; --shadow: 0 8px 24px rgba(15, 23, 42, 0.08); --radius: 16px; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; background: var(--bg); color: var(--text); overflow-x: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        .mobile-page { min-height: 100vh; padding: calc(env(safe-area-inset-top, 0px) + 14px) 14px calc(env(safe-area-inset-bottom, 0px) + 18px); }
        .mobile-header { margin-bottom: 14px; }
        .mobile-title { margin: 0; font-size: 26px; line-height: 1.12; font-weight: 800; letter-spacing: -0.02em; }
        .mobile-context { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.45; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
        .filter-open-btn { border: 0; border-radius: 12px; background: var(--primary); color: #fff; padding: 11px 14px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow); }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
        .kpi-card, .chart-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(229,231,235,.85); }
        .kpi-card { padding: 12px; min-height: 112px; display: flex; flex-direction: column; justify-content: center; }
        .kpi-title { font-size: 11px; line-height: 1.2; text-transform: uppercase; color: var(--muted); font-weight: 700; letter-spacing: .02em; margin-bottom: 6px; }
        .kpi-value { font-size: 23px; line-height: 1.1; font-weight: 800; color: var(--text); }
        .kpi-diff { margin-top: 8px; font-size: 12px; line-height: 1.35; display: flex; flex-wrap: wrap; gap: 6px; }
        .diff-pos { color: var(--ok); font-weight: 700; }
        .diff-neg { color: var(--bad); font-weight: 700; }
        .diff-neutral { color: var(--muted); font-weight: 700; }
        .diff-chip { background: #f3f4f6; color: #4b5563; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
        .chart-stack { display: flex; flex-direction: column; gap: 12px; }
        .chart-card { padding: 14px; }
        .chart-head { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .chart-title { margin: 0; font-size: 16px; line-height: 1.2; font-weight: 800; }
        .mobile-toggle-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .mobile-toggle-btn { border: 1px solid #d1d5db; background: #f9fafb; color: #4b5563; border-radius: 10px; padding: 8px 10px; font-size: 12px; line-height: 1.15; font-weight: 700; }
        .mobile-toggle-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .chart-wrap { position: relative; height: 270px; }
        .chart-wrap.tall { height: 300px; }
        .chart-canvas { width: 100% !important; height: 100% !important; }
        .sheet-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); opacity: 0; visibility: hidden; transition: .2s ease; z-index: 1000; }
        .sheet-backdrop.open { opacity: 1; visibility: visible; }
        .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform .22s ease; z-index: 1001; max-height: 82vh; padding: 14px 14px calc(env(safe-area-inset-bottom, 0px) + 16px); overflow: auto; box-shadow: 0 -10px 30px rgba(15,23,42,.18); }
        .sheet.open { transform: translateY(0); }
        .sheet-handle { width: 44px; height: 5px; border-radius: 999px; background: #d1d5db; margin: 0 auto 12px; }
        .sheet-title { margin: 0 0 12px; font-size: 18px; font-weight: 800; }
        .field { margin-bottom: 14px; }
        .field-label { display:block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #374151; }
        .select, .checklist { width: 100%; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; }
        .select { padding: 11px 12px; font-size: 15px; }
        .checklist { max-height: 180px; overflow: auto; padding: 6px; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 10px; font-size: 14px; color: #111827; }
        .check-item:active { background: #f9fafb; }
        .check-item-strong { font-weight: 700; border-bottom: 1px solid #e5e7eb; margin-bottom: 4px; }
        .sheet-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 8px; }
        .btn { border: 0; border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 700; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: #eef2ff; color: var(--primary); }
    </style>
</head>

            <div class="kpi-card"><div class="kpi-title">Выручка по билетам, тыс. руб.</div><div id="kpi-rev-tickets" class="kpi-value">0</div><div class="kpi-diff"><span id="kpi-rev-tickets-diff-abs" class="diff-neutral">0</span><span id="kpi-rev-tickets-diff-pct" class="diff-chip">0% YoY</span></div></div>
            <div class="kpi-card"><div class="kpi-title">Количество билетов, шт.</div><div id="kpi-tickets" class="kpi-value">0</div><div class="kpi-diff"><span id="kpi-tickets-diff-abs" class="diff-neutral">0</span><span id="kpi-tickets-diff-pct" class="diff-chip">0% YoY</span></div></div>
            <div class="kpi-card"><div class="kpi-title">Средний чек (Общий), руб.</div><div id="kpi-avg-total" class="kpi-value">0</div><div class="kpi-diff"><span id="kpi-avg-total-diff-abs" class="diff-neutral">0</span><span id="kpi-avg-total-diff-pct" class="diff-chip">0% YoY</span></div></div>
        </section>
        <section class="chart-stack">
            <div class="chart-card"><div class="chart-head"><h2 id="titleDynamics" class="chart-title">Динамика по месяцам</h2><div id="mobileDynamicsToggles" class="mobile-toggle-group"><button class="mobile-toggle-btn active" data-metric="rev" type="button">Выручка</button><button class="mobile-toggle-btn" data-metric="tickets" type="button">Билеты</button><button class="mobile-toggle-btn" data-metric="avg_total" type="button">Ср.чек общий</button><button class="mobile-toggle-btn" data-metric="avg_ticket" type="button">Ср.чек билеты</button></div></div><div class="chart-wrap"><canvas id="chartDynamics" class="chart-canvas"></canvas></div></div>
            <div class="chart-card"><div class="chart-head"><h2 id="titleCompany" class="chart-title">По компании</h2><div id="mobileCompanyToggles" class="mobile-toggle-group"><button class="mobile-toggle-btn active" data-metric="rev" type="button">Выручка</button><button class="mobile-toggle-btn" data-metric="tickets" type="button">Билеты</button><button class="mobile-toggle-btn" data-metric="avg_total" type="button">Ср.чек общий</button><button class="mobile-toggle-btn" data-metric="avg_ticket" type="button">Ср.чек билеты</button></div></div><div class="chart-wrap tall"><canvas id="chartCompany" class="chart-canvas"></canvas></div></div>
            <div class="chart-card"><div class="chart-head"><h2 id="titleRevTypes" class="chart-title">Структура выручки</h2></div><div class="chart-wrap tall"><canvas id="chartRevTypes" class="chart-canvas"></canvas></div></div>
            <div class="chart-card"><div class="chart-head"><h2 id="titleStructureChange" class="chart-title">Изменение структуры выручки</h2></div><div class="chart-wrap tall"><canvas id="chartStructureChange" class="chart-canvas"></canvas></div></div>
        </section>
    </div>
    <div id="mobileSheetBackdrop" class="sheet-backdrop"></div>
    <div id="mobileFilterSheet" class="sheet" aria-hidden="true"><div class="sheet-handle"></div><h3 class="sheet-title">Фильтры</h3><div class="field"><label class="field-label" for="mobileFilterYear">Год</label><select id="mobileFilterYear" class="select"></select></div><div class="field"><div class="field-label">Месяцы</div><div id="mobileFilterMonthContainer" class="checklist"></div></div><div class="field"><div class="field-label">Филиалы</div><div id="mobileFilterBranchContainer" class="checklist"></div></div><div class="sheet-actions"><button id="btnResetMobileFilters" class="btn btn-secondary" type="button">Сбросить</button><button id="btnApplyMobileFilters" class="btn btn-primary" type="button">Применить</button></div></div>

                'вид выручки': row['вид выручки'],
                'Осн. группа': row['Осн. группа'],
                'Выручка': Number(row['Выручка'] || 0),
                'Кол-во билетов': Number(row['Кол-во билетов'] || 0)
            };
        }

        function fmtNum(num, isK) {
            const value = isK ? num / 1000 : num;
            return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(value || 0);
        }

        function fmtPct(num) {
            return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(num || 0) + '%';
        }

        function getMetricUnit(metric) {
            if (metric === 'rev') return 'тыс. руб.';
            if (metric === 'tickets') return 'шт.';
            return 'руб.';
        }

        function getFilteredData(year, ignoreBranch, ignoreMonth) {
            return rawData.filter(function(d) {
                return d['год'] === year &&
                    (ignoreMonth || state.selectedMonths.length === 0 || state.selectedMonths.includes(d['месяц'])) &&
                    (ignoreBranch || state.selectedBranches.length === 0 || state.selectedBranches.includes(d['филиал']));
            });
        }

        function aggregateRows(rows) {
            return rows.reduce(function(acc, d) {
                acc.rev += d['Выручка'];
                acc.tickets += d['Кол-во билетов'];
                if (d['вид выручки'] === 'Билеты') acc.ticketRev += d['Выручка'];
                return acc;
            }, { rev: 0, tickets: 0, ticketRev: 0 });
        }

        function metricValue(agg, metric) {
            if (metric === 'rev') return agg.rev / 1000;
            if (metric === 'tickets') return agg.tickets;
            if (metric === 'avg_total') return agg.tickets ? agg.rev / agg.tickets : 0;
            return agg.tickets ? agg.ticketRev / agg.tickets : 0;
        }

        function calcRevenueMix(rows) {
            const result = {
                'Билеты оффлайн': 0,
                'Билеты онлайн': 0,
                'Фото': 0,
                'Прочая выручка': 0,
                'Кафе': 0
            };
            rows.forEach(function(d) {
                const type = d['вид выручки'];
                const source = String(d['источник'] || '').toLowerCase();
                if (type === 'Билеты') {
                    if (source === 'онлайн') result['Билеты онлайн'] += d['Выручка'];
                    else result['Билеты оффлайн'] += d['Выручка'];
                } else if (type === 'Фото') {
                    result['Фото'] += d['Выручка'];
                } else if (type === 'Прочая выручка') {
                    result['Прочая выручка'] += d['Выручка'];
                } else if (type === 'Кафе') {
                    result['Кафе'] += d['Выручка'];
                } else {
                    result['Прочая выручка'] += d['Выручка'];
                }
            });
            return result;
        }

        function getTitleBranchSuffix() {
            const totalBranches = state.availableBranches.length;
            const selected = state.selectedBranches;
            if (selected.length === 0 || selected.length === totalBranches) return 'Все филиалы';
            if (selected.length === 1) return selected[0];
            if (selected.length <= 3) return selected.join(', ');
            return 'Филиалы (' + selected.length + ')';
        }

        function getCurrentFilterContextText() {
            const yearText = state.selectedYear ? String(state.selectedYear) : '—';
            const monthCount = MONTHS_ORDER.length;
            const monthText = state.selectedMonths.length === 0 || state.selectedMonths.length === monthCount
                ? 'Все месяцы'
                : (state.selectedMonths.length === 1 ? state.selectedMonths[0] : 'Месяцы: ' + state.selectedMonths.length);
            const branchText = state.selectedBranches.length === 0 || state.selectedBranches.length === state.availableBranches.length
                ? 'Все филиалы'
                : (state.selectedBranches.length === 1 ? state.selectedBranches[0] : 'Филиалы: ' + state.selectedBranches.length);
            return yearText + ' год • ' + monthText + ' • ' + branchText;
        }

        function updateTitles() {
            const branchLabel = getTitleBranchSuffix();
            const titleDynamics = document.getElementById('titleDynamics');
            const titleCompany = document.getElementById('titleCompany');
            const titleRevTypes = document.getElementById('titleRevTypes');
            const titleStructureChange = document.getElementById('titleStructureChange');
            if (titleDynamics) titleDynamics.textContent = 'Динамика по месяцам — ' + branchLabel;
            if (titleCompany) titleCompany.textContent = 'По компании';
            if (titleRevTypes) titleRevTypes.textContent = 'Структура выручки — ' + branchLabel;
            if (titleStructureChange) titleStructureChange.textContent = 'Изменение структуры выручки — ' + branchLabel;
        }

        function setDiff(absEl, pctEl, currentValue, previousValue, isK) {
            if (!absEl || !pctEl) return;
            const diff = currentValue - previousValue;
            const pct = previousValue !== 0 ? (diff / previousValue) * 100 : 0;
            if (diff === 0) absEl.textContent = '0';
            else absEl.textContent = (diff > 0 ? '▲ +' : '▼ ') + fmtNum(diff, isK);
            absEl.className = (EXPORT_LAYOUT === 'mobile' ? '' : 'font-semibold mr-2 ') + (diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : 'diff-neutral'));
            pctEl.textContent = (pct > 0 ? '+' : '') + pct.toFixed(1) + '% YoY';
        }

        function updateKPIs() {
            const current = aggregateRows(getFilteredData(state.selectedYear, false, false));
            const previous = aggregateRows(getFilteredData(state.selectedYear - 1, false, false));
            [
                ['rev', current.rev, previous.rev, true],
                ['rev-tickets', current.ticketRev, previous.ticketRev, true],
                ['tickets', current.tickets, previous.tickets, false],
                ['avg-total', current.tickets ? current.rev / current.tickets : 0, previous.tickets ? previous.rev / previous.tickets : 0, false],
                ['avg-tickets', current.tickets ? current.ticketRev / current.tickets : 0, previous.tickets ? previous.ticketRev / previous.tickets : 0, false]
            ].forEach(function(item) {
                const id = item[0];
                const valueEl = document.getElementById('kpi-' + id);
                const absEl = document.getElementById('kpi-' + id + '-diff-abs');
                const pctEl = document.getElementById('kpi-' + id + '-diff-pct');
                if (valueEl) valueEl.textContent = fmtNum(item[1], item[3]);
                setDiff(absEl, pctEl, item[1], item[2], item[3]);
            });
            const mobileContext = document.getElementById('mobileFilterContext');
            if (mobileContext) mobileContext.textContent = getCurrentFilterContextText();
        }

        function updateToggleButtons() {
            ['#dynamics-toggles button', '#mobileDynamicsToggles button'].forEach(function(selector) {
                document.querySelectorAll(selector).forEach(function(btn) { btn.classList.toggle('active', btn.dataset.metric === state.dynamicsMetric); });
            });
            ['#company-toggles button', '#mobileCompanyToggles button'].forEach(function(selector) {
                document.querySelectorAll(selector).forEach(function(btn) { btn.classList.toggle('active', btn.dataset.metric === state.companyMetric); });
            });
        }

        function renderDynamicsChart() {
            const canvas = document.getElementById('chartDynamics');
            if (!canvas) return;
            const yearsToShow = [state.selectedYear, state.selectedYear - 1, state.selectedYear - 2].filter(function(y) { return state.availableYears.includes(y); });
            const datasets = yearsToShow.map(function(year) {
                const yearData = rawData.filter(function(d) { return d['год'] === year && (state.selectedBranches.length === 0 || state.selectedBranches.includes(d['филиал'])); });
                const monthAgg = {};
                MONTHS_ORDER.forEach(function(month) { monthAgg[month] = { rev: 0, tickets: 0, ticketRev: 0 }; });
                yearData.forEach(function(d) {
                    monthAgg[d['месяц']].rev += d['Выручка'];
                    monthAgg[d['месяц']].tickets += d['Кол-во билетов'];
                    if (d['вид выручки'] === 'Билеты') monthAgg[d['месяц']].ticketRev += d['Выручка'];
                });
                let lastValidIndex = -1;
                MONTHS_ORDER.forEach(function(month, index) { if (monthAgg[month].rev > 0 || monthAgg[month].tickets > 0) lastValidIndex = index; });
                const colorKey = year === state.selectedYear ? 'currentYear' : (year === state.selectedYear - 1 ? 'prevYear' : 'prevPrevYear');
                return {
                    label: year + ' год',
                    data: MONTHS_ORDER.map(function(month, index) { return index > lastValidIndex ? null : metricValue(monthAgg[month], state.dynamicsMetric); }),
                    borderColor: COLORS[colorKey],
                    backgroundColor: COLORS[colorKey],
                    tension: 0.3,
                    borderWidth: 2,
                    pointRadius: year === state.selectedYear ? 4 : 0,
                    pointHoverRadius: 5,
                    spanGaps: false
                };
            });
            if (charts.dynamics) charts.dynamics.destroy();
            charts.dynamics = new Chart(canvas, {
                type: 'line',
                data: { labels: MONTHS_ORDER, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 10, font: { size: EXPORT_LAYOUT === 'mobile' ? 10 : 11 } } },
                        datalabels: { display: false },
                        tooltip: { enabled: true }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { font: { size: EXPORT_LAYOUT === 'mobile' ? 10 : 10 }, callback: function(value) { return fmtNum(value); } } },
                        x: { grid: { display: false }, ticks: { font: { size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 } } }
                    }
                }
            });
        }

        function renderCompanyChart() {
            const canvas = document.getElementById('chartCompany');
            if (!canvas) return;
            const rows = getFilteredData(state.selectedYear, true, false);
            const prevRows = getFilteredData(state.selectedYear - 1, true, false);
            const byBranch = {};
            const prevByBranch = {};
            rows.forEach(function(d) {
                const branch = d['филиал'];
                if (!byBranch[branch]) byBranch[branch] = { rev: 0, tickets: 0, ticketRev: 0 };
                byBranch[branch].rev += d['Выручка'];
                byBranch[branch].tickets += d['Кол-во билетов'];
                if (d['вид выручки'] === 'Билеты') byBranch[branch].ticketRev += d['Выручка'];
            });
            prevRows.forEach(function(d) {
                const branch = d['филиал'];
                if (!prevByBranch[branch]) prevByBranch[branch] = { rev: 0, tickets: 0, ticketRev: 0 };
                prevByBranch[branch].rev += d['Выручка'];
                prevByBranch[branch].tickets += d['Кол-во билетов'];
                if (d['вид выручки'] === 'Билеты') prevByBranch[branch].ticketRev += d['Выручка'];
            });
            const sortedBranches = Object.keys(byBranch).sort(function(a, b) { return metricValue(byBranch[b], state.companyMetric) - metricValue(byBranch[a], state.companyMetric); });
            const values = sortedBranches.map(function(branch) { return metricValue(byBranch[branch], state.companyMetric); });
            const totalRevenue = sortedBranches.reduce(function(sum, branch) { return sum + byBranch[branch].rev; }, 0);
            const yoyValues = sortedBranches.map(function(branch) {
                const currentValue = metricValue(byBranch[branch], state.companyMetric);
                const previousValue = metricValue(prevByBranch[branch] || { rev: 0, tickets: 0, ticketRev: 0 }, state.companyMetric);
                if (!previousValue) return null;
                return ((currentValue - previousValue) / previousValue) * 100;
            });
            if (charts.company) charts.company.destroy();
            charts.company = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: sortedBranches,
                    datasets: [{
                        data: values,
                        backgroundColor: COLORS.barBase,
                        borderRadius: 5,
                        datalabels: {
                            labels: {
                                value: { anchor: 'end', align: 'end', color: '#374151', font: { weight: 'bold', size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 }, formatter: function(value) { return fmtNum(value); } },
                                yoy: {
                                    anchor: 'end', align: 'end', font: { weight: 'bold', size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 },
                                    offset: function(ctx) { const strLen = fmtNum(ctx.dataset.data[ctx.dataIndex]).length; return strLen * (EXPORT_LAYOUT === 'mobile' ? 6 : 7) + 8; },
                                    color: function(ctx) { const yoy = yoyValues[ctx.dataIndex]; if (yoy === null) return '#9ca3af'; if (yoy > 0) return '#10b981'; if (yoy < 0) return '#ef4444'; return '#9ca3af'; },
                                    formatter: function(value, ctx) { const yoy = yoyValues[ctx.dataIndex]; if (yoy === null) return ''; return (yoy > 0 ? '+' : '') + fmtPct(yoy) + ' YoY'; }
                                }
                            }
                        }
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: EXPORT_LAYOUT === 'mobile' ? 76 : 84 } },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = METRIC_TITLES[state.companyMetric];
                                    const branch = context.label;
                                    const value = context.raw;
                                    if (state.companyMetric === 'rev') {
                                        const revenue = byBranch[branch].rev;
                                        const share = totalRevenue > 0 ? (revenue / totalRevenue) * 100 : 0;
                                        return label + ': ' + fmtNum(value) + ' ' + getMetricUnit(state.companyMetric) + ' (' + share.toFixed(1) + '%)';
                                    }
                                    return label + ': ' + fmtNum(value) + ' ' + getMetricUnit(state.companyMetric);
                                },
                                afterLabel: function(context) {
                                    const yoy = yoyValues[context.dataIndex];
                                    if (yoy === null) return 'YoY: н/д';
                                    return 'YoY: ' + (yoy > 0 ? '+' : '') + fmtPct(yoy);
                                }
                            }
                        }
                    },
                    scales: {
                        x: { display: false, suggestedMax: (Math.max.apply(null, values.concat([0])) || 0) * 1.34 },
                        y: { grid: { display: false }, ticks: { font: { size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 } } }
                    }
                }
            });
        }

        function renderRevenueStructureChart() {
            const canvas = document.getElementById('chartRevTypes');
            if (!canvas) return;
            const currentMix = calcRevenueMix(getFilteredData(state.selectedYear, false, false));
            const previousMix = calcRevenueMix(getFilteredData(state.selectedYear - 1, false, false));
            const currentValues = STRUCTURE_LABELS.map(function(label) { return currentMix[label] / 1000; });
            const previousValues = STRUCTURE_LABELS.map(function(label) { return previousMix[label] / 1000; });
            if (charts.revTypes) charts.revTypes.destroy();
            charts.revTypes = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: STRUCTURE_LABELS,
                    datasets: [
                        {
                            label: state.selectedYear + ' год',
                            data: currentValues,
                            backgroundColor: COLORS.barBase,
                            borderRadius: 4,
                            datalabels: {
                                labels: {
                                    value: { anchor: 'end', align: 'end', color: '#374151', font: { weight: 'bold', size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 }, formatter: function(value) { return value > 0 ? fmtNum(value) : ''; } },
                                    yoy: {
                                        anchor: 'end', align: 'end', font: { weight: 'bold', size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 },
                                        offset: function(ctx) { const strLen = fmtNum(currentValues[ctx.dataIndex]).length; return strLen * (EXPORT_LAYOUT === 'mobile' ? 6 : 7) + 10; },
                                        color: function(ctx) { const cur = currentValues[ctx.dataIndex]; const prev = previousValues[ctx.dataIndex]; if (!prev) return '#9ca3af'; return cur > prev ? '#10b981' : (cur < prev ? '#ef4444' : '#9ca3af'); },
                                        formatter: function(value, ctx) { const cur = currentValues[ctx.dataIndex]; const prev = previousValues[ctx.dataIndex]; if (!cur || !prev) return ''; const diff = ((cur - prev) / prev) * 100; return (diff > 0 ? '+' : '') + diff.toFixed(1) + '%'; }
                                    }
                                }
                            }
                        },
                        {
                            label: (state.selectedYear - 1) + ' год',
                            data: previousValues,
                            backgroundColor: COLORS.prevYear,
                            borderRadius: 4,
                            datalabels: { anchor: 'end', align: 'end', color: '#6b7280', font: { size: EXPORT_LAYOUT === 'mobile' ? 8 : 9 }, formatter: function(value) { return value > 0 ? fmtNum(value) : ''; } }
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: EXPORT_LAYOUT === 'mobile' ? 72 : 84 } },
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: EXPORT_LAYOUT === 'mobile' ? 10 : 11 } } } },
                    scales: {
                        x: { display: false, suggestedMax: (Math.max.apply(null, currentValues.concat(previousValues).concat([0])) || 0) * 1.35 },
                        y: { grid: { display: false }, ticks: { font: { size: EXPORT_LAYOUT === 'mobile' ? 9 : 10 } } }
                    }
                }
            });
        }

        function renderStructureChangeChart() {
            const canvas = document.getElementById('chartStructureChange');
            if (!canvas) return;
            const years = [state.selectedYear, state.selectedYear - 1, state.selectedYear - 2].filter(function(year) { return state.availableYears.includes(year); });
            const yearMixes = years.map(function(year) {
                const mix = calcRevenueMix(getFilteredData(year, false, false));
                const total = STRUCTURE_LABELS.reduce(function(sum, label) { return sum + mix[label]; }, 0);
                return { year: year, mix: mix, total: total };
            });
            const datasets = STRUCTURE_LABELS.map(function(label, idx) {
                return {
                    label: label,
                    data: yearMixes.map(function(item) { return item.total > 0 ? (item.mix[label] / item.total) * 100 : 0; }),
                    rawValues: yearMixes.map(function(item) { return item.mix[label]; }),
                    backgroundColor: COLORS.piePalette[idx],
                    borderRadius: 2,
                    borderSkipped: false
                };
            });
            if (charts.structureChange) charts.structureChange.destroy();
            charts.structureChange = new Chart(canvas, {
                type: 'bar',
                data: { labels: years.map(function(year) { return year + ' год'; }), datasets: datasets },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: 10 } },
                    plugins: {
                        legend: { position: 'top', align: 'start', labels: { boxWidth: 10, font: { size: EXPORT_LAYOUT === 'mobile' ? 10 : 11 } } },
                        tooltip: { callbacks: { label: function(context) { const pct = context.raw || 0; const rawValue = context.dataset.rawValues[context.dataIndex] || 0; return context.dataset.label + ': ' + pct.toFixed(1) + '% (' + fmtNum(rawValue, true) + ' тыс.руб)'; } } },
                        datalabels: { anchor: 'center', align: 'center', color: '#ffffff', font: { weight: 'bold', size: EXPORT_LAYOUT === 'mobile' ? 9 : 11 }, formatter: function(value, context) { return (context.dataset.label === 'Кафе' || value <= 0) ? '' : value.toFixed(0) + '%'; }, clamp: false, clip: false }
                    },
                    scales: { x: { stacked: true, min: 0, max: 100, display: false, grid: { display: false }, ticks: { display: false } }, y: { stacked: true, grid: { display: false }, ticks: { font: { size: EXPORT_LAYOUT === 'mobile' ? 10 : 11 } } } }
                }
            });
        }

        function updateDashboardExportView() {
            updateTitles();
            updateToggleButtons();
            updateKPIs();
            renderDynamicsChart();
            renderCompanyChart();
            renderRevenueStructureChart();
            renderStructureChangeChart();
        }

        function updateDesktopFilterLabels() {
            const monthLabel = document.getElementById('monthFilterLabel');
            const branchLabel = document.getElementById('branchFilterLabel');
            const monthCount = document.querySelectorAll('.cb-month').length;
            const branchCount = document.querySelectorAll('.cb-branch').length;
            if (monthLabel) {
                if (state.selectedMonths.length === 0 || state.selectedMonths.length === monthCount) monthLabel.textContent = 'Месяцы (Все)';
                else if (state.selectedMonths.length === 1) monthLabel.textContent = state.selectedMonths[0];
                else monthLabel.textContent = 'Месяцы (' + state.selectedMonths.length + ')';
            }
            if (branchLabel) {
                if (state.selectedBranches.length === 0 || state.selectedBranches.length === branchCount) branchLabel.textContent = 'Филиалы (Все)';
                else if (state.selectedBranches.length === 1) branchLabel.textContent = state.selectedBranches[0];
                else branchLabel.textContent = 'Филиалы (' + state.selectedBranches.length + ')';
            }
        }

        function syncDesktopFilterControlsFromState() {
            const yearSelect = document.getElementById('filterYear');
            if (yearSelect && state.selectedYear) yearSelect.value = String(state.selectedYear);
            const monthCheckboxes = Array.from(document.querySelectorAll('.cb-month'));
            const branchCheckboxes = Array.from(document.querySelectorAll('.cb-branch'));
            monthCheckboxes.forEach(function(cb) { cb.checked = state.selectedMonths.length === 0 || state.selectedMonths.includes(cb.value); });
            branchCheckboxes.forEach(function(cb) { cb.checked = state.selectedBranches.length === 0 || state.selectedBranches.includes(cb.value); });
            const monthAll = document.getElementById('cb-month-all');
            const branchAll = document.getElementById('cb-branch-all');
            if (monthAll) monthAll.checked = state.selectedMonths.length === 0 || state.selectedMonths.length === monthCheckboxes.length;
            if (branchAll) branchAll.checked = state.selectedBranches.length === 0 || state.selectedBranches.length === branchCheckboxes.length;
            updateDesktopFilterLabels();
        }

        function updateDesktopStateFromCheckboxes() {
            var monthCheckboxes = Array.from(document.querySelectorAll('.cb-month'));
            var branchCheckboxes = Array.from(document.querySelectorAll('.cb-branch'));
            state.selectedMonths = monthCheckboxes.filter(function(cb) { return cb.checked; }).map(function(cb) { return cb.value; });
            state.selectedBranches = branchCheckboxes.filter(function(cb) { return cb.checked; }).map(function(cb) { return cb.value; });
            if (state.selectedMonths.length === monthCheckboxes.length && monthCheckboxes.length > 0) state.selectedMonths = [];
            if (state.selectedBranches.length === branchCheckboxes.length && branchCheckboxes.length > 0) state.selectedBranches = [];
            syncDesktopFilterControlsFromState();
            updateDashboardExportView();
        }

        function renderDesktopFilters() {
            const years = Array.from(new Set(rawData.map(function(d) { return d['год']; }).filter(Boolean))).sort(function(a, b) { return b - a; });
            const branches = Array.from(new Set(rawData.map(function(d) { return d['филиал']; }).filter(Boolean))).sort();
            state.availableYears = years;
            state.availableBranches = branches;
            if (!state.selectedYear && years.length > 0) state.selectedYear = years[0];
            const yearSelect = document.getElementById('filterYear');
            yearSelect.innerHTML = '';
            years.forEach(function(year) { const opt = document.createElement('option'); opt.value = year; opt.textContent = year + ' год'; yearSelect.appendChild(opt); });
            document.getElementById('filterMonthContainer').innerHTML = '<label class="check-row check-row-strong"><input type="checkbox" id="cb-month-all"><span>Выбрать все</span></label>' + MONTHS_ORDER.map(function(month) { return '<label class="check-row"><input type="checkbox" value="' + month + '" class="cb-month"><span>' + month + '</span></label>'; }).join('');
            document.getElementById('filterBranchContainer').innerHTML = '<label class="check-row check-row-strong"><input type="checkbox" id="cb-branch-all"><span>Выбрать все</span></label>' + branches.map(function(branch) { return '<label class="check-row"><input type="checkbox" value="' + branch + '" class="cb-branch"><span>' + branch + '</span></label>'; }).join('');
            syncDesktopFilterControlsFromState();
        }

        function setupDesktopEventListeners() {
            const btnMonth = document.getElementById('btnMonthFilter');
            const btnBranch = document.getElementById('btnBranchFilter');
            const monthContainer = document.getElementById('filterMonthContainer');
            const branchContainer = document.getElementById('filterBranchContainer');
            btnMonth.addEventListener('click', function(e) { e.stopPropagation(); monthContainer.classList.toggle('hidden'); branchContainer.classList.add('hidden'); });
            btnBranch.addEventListener('click', function(e) { e.stopPropagation(); branchContainer.classList.toggle('hidden'); monthContainer.classList.add('hidden'); });
            monthContainer.addEventListener('click', function(e) { e.stopPropagation(); });
            branchContainer.addEventListener('click', function(e) { e.stopPropagation(); });
            document.addEventListener('click', function() { monthContainer.classList.add('hidden'); branchContainer.classList.add('hidden'); });
            document.getElementById('filterYear').addEventListener('change', function(e) { state.selectedYear = parseInt(e.target.value, 10); updateDashboardExportView(); });
            monthContainer.addEventListener('change', function(e) {
                if (e.target.id === 'cb-month-all') {
                    if (e.target.checked) {
                        state.selectedMonths = [];
                        syncDesktopFilterControlsFromState();
                        updateDashboardExportView();
                    } else {
                        document.querySelectorAll('.cb-month').forEach(function(cb) { cb.checked = false; });
                    }
                    return;
                }
                updateDesktopStateFromCheckboxes();
            });
            branchContainer.addEventListener('change', function(e) {
                if (e.target.id === 'cb-branch-all') {
                    if (e.target.checked) {
                        state.selectedBranches = [];
                        syncDesktopFilterControlsFromState();
                        updateDashboardExportView();
                    } else {
                        document.querySelectorAll('.cb-branch').forEach(function(cb) { cb.checked = false; });
                    }
                    return;
                }
                updateDesktopStateFromCheckboxes();
            });
            const dynamicsToggles = document.getElementById('dynamics-toggles');
            if (dynamicsToggles) dynamicsToggles.addEventListener('click', function(e) { const btn = e.target.closest('button[data-metric]'); if (!btn) return; state.dynamicsMetric = btn.dataset.metric; updateDashboardExportView(); });
            const companyToggles = document.getElementById('company-toggles');
            if (companyToggles) companyToggles.addEventListener('click', function(e) { const btn = e.target.closest('button[data-metric]'); if (!btn) return; state.companyMetric = btn.dataset.metric; updateDashboardExportView(); });
        }

        function renderMobileFilters() {
            const years = Array.from(new Set(rawData.map(function(d) { return d['год']; }).filter(Boolean))).sort(function(a, b) { return b - a; });
            const branches = Array.from(new Set(rawData.map(function(d) { return d['филиал']; }).filter(Boolean))).sort();
            state.availableYears = years;
            state.availableBranches = branches;
            if (!state.selectedYear && years.length > 0) state.selectedYear = years[0];
            document.getElementById('mobileFilterYear').innerHTML = years.map(function(year) { return '<option value="' + year + '">' + year + ' год</option>'; }).join('');
            document.getElementById('mobileFilterMonthContainer').innerHTML = '<label class="check-item check-item-strong"><input type="checkbox" id="mobile-month-all"><span>Выбрать все</span></label>' + MONTHS_ORDER.map(function(month) { return '<label class="check-item"><input type="checkbox" value="' + month + '" class="mobile-month-cb"><span>' + month + '</span></label>'; }).join('');
            document.getElementById('mobileFilterBranchContainer').innerHTML = '<label class="check-item check-item-strong"><input type="checkbox" id="mobile-branch-all"><span>Выбрать все</span></label>' + branches.map(function(branch) { return '<label class="check-item"><input type="checkbox" value="' + branch + '" class="mobile-branch-cb"><span>' + branch + '</span></label>'; }).join('');
            syncMobileFilterControlsFromState();
        }

        function syncMobileFilterControlsFromState() {
            const yearSelect = document.getElementById('mobileFilterYear');
            if (yearSelect && state.selectedYear) yearSelect.value = String(state.selectedYear);
            const monthCheckboxes = Array.from(document.querySelectorAll('.mobile-month-cb'));
            const branchCheckboxes = Array.from(document.querySelectorAll('.mobile-branch-cb'));
            monthCheckboxes.forEach(function(cb) { cb.checked = state.selectedMonths.length === 0 || state.selectedMonths.includes(cb.value); });
            branchCheckboxes.forEach(function(cb) { cb.checked = state.selectedBranches.length === 0 || state.selectedBranches.includes(cb.value); });
            const monthAll = document.getElementById('mobile-month-all');
            const branchAll = document.getElementById('mobile-branch-all');
            if (monthAll) monthAll.checked = state.selectedMonths.length === 0 || state.selectedMonths.length === monthCheckboxes.length;
            if (branchAll) branchAll.checked = state.selectedBranches.length === 0 || state.selectedBranches.length === branchCheckboxes.length;
        }

        function openMobileFilterSheet() { const sheet = document.getElementById('mobileFilterSheet'); const backdrop = document.getElementById('mobileSheetBackdrop'); if (!sheet || !backdrop) return; syncMobileFilterControlsFromState(); sheet.classList.add('open'); backdrop.classList.add('open'); }
        function closeMobileFilterSheet() { const sheet = document.getElementById('mobileFilterSheet'); const backdrop = document.getElementById('mobileSheetBackdrop'); if (!sheet || !backdrop) return; sheet.classList.remove('open'); backdrop.classList.remove('open'); }
        function applyMobileFilters() {
            state.selectedYear = parseInt(document.getElementById('mobileFilterYear').value, 10);
            state.selectedMonths = Array.from(document.querySelectorAll('.mobile-month-cb:checked')).map(function(cb) { return cb.value; });
            state.selectedBranches = Array.from(document.querySelectorAll('.mobile-branch-cb:checked')).map(function(cb) { return cb.value; });
            if (state.selectedMonths.length === document.querySelectorAll('.mobile-month-cb').length) state.selectedMonths = [];
            if (state.selectedBranches.length === document.querySelectorAll('.mobile-branch-cb').length) state.selectedBranches = [];
            closeMobileFilterSheet();
            updateDashboardExportView();
        }
        function resetMobileFilters() { state.selectedYear = state.availableYears.length ? state.availableYears[0] : state.selectedYear; state.selectedMonths = []; state.selectedBranches = []; syncMobileFilterControlsFromState(); }

        function setupMobileEventListeners() {
            document.getElementById('btnOpenMobileFilters').addEventListener('click', openMobileFilterSheet);
            document.getElementById('mobileSheetBackdrop').addEventListener('click', closeMobileFilterSheet);
            document.getElementById('btnApplyMobileFilters').addEventListener('click', applyMobileFilters);
            document.getElementById('btnResetMobileFilters').addEventListener('click', resetMobileFilters);
            document.getElementById('mobileFilterMonthContainer').addEventListener('change', function(e) {
                if (e.target.id === 'mobile-month-all') {
                    if (e.target.checked) {
                        state.selectedMonths = [];
                        syncMobileFilterControlsFromState();
                    } else {
                        document.querySelectorAll('.mobile-month-cb').forEach(function(cb) { cb.checked = false; });
                    }
                }
            });
            document.getElementById('mobileFilterBranchContainer').addEventListener('change', function(e) {
                if (e.target.id === 'mobile-branch-all') {
                    if (e.target.checked) {
                        state.selectedBranches = [];
                        syncMobileFilterControlsFromState();
                    } else {
                        document.querySelectorAll('.mobile-branch-cb').forEach(function(cb) { cb.checked = false; });
                    }
                }
            });
            const mobileDynamics = document.getElementById('mobileDynamicsToggles');
            if (mobileDynamics) mobileDynamics.addEventListener('click', function(e) { const btn = e.target.closest('button[data-metric]'); if (!btn) return; state.dynamicsMetric = btn.dataset.metric; updateDashboardExportView(); });
            const mobileCompany = document.getElementById('mobileCompanyToggles');
            if (mobileCompany) mobileCompany.addEventListener('click', function(e) { const btn = e.target.closest('button[data-metric]'); if (!btn) return; state.companyMetric = btn.dataset.metric; updateDashboardExportView(); });
        }

        function initExportDashboard() {
            if (EXPORT_LAYOUT === 'mobile') {
                renderMobileFilters();
                setupMobileEventListeners();
            } else {
                renderDesktopFilters();
                setupDesktopEventListeners();
            }
            updateDashboardExportView();
        }

        document.addEventListener('DOMContentLoaded', initExportDashboard);
    </script>
</body>
</html>
